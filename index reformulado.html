<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login S.O.C.T.</title>


    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=League+Spartan:wght@700;900&display=swap" rel="stylesheet">
   


</head>
<body>

    <div class="container">
        <div class="container__conteudo">
            <div class="login">

                <h1 class="login__titulo"> 
                    Faça Login ou Cadastre-se
                </h1>

                <p class="login__titulo-texto">
                    Bem-Vindo!
                    <br>
                    É muito bom te ver!
                </p>

                <hr class="login__linha">

                <br>

                <div class="login__input">
                    <input type="text" 
                    name="usuario" 
                    id="usuario"
                    
                    placeholder="Usuário">

                </div> <!-- Fim do login input texto -->

                <div class="login__input">
                    <input type="password" 
                    name="senha" 
                    id="senha"
                    
                    placeholder="Senha">
                    
                </div> <!-- Fim do login input senha -->

                <!-- LINK -->
                <a href="redefinicao.html"
                class="login__esqueceu-senha"
                >Esqueceu a senha?</a>

                <!-- BOTÕES 
                Ainda falta o link para entrar 
                -->
                <button class="login__botao-entrar">
                    Entrar
                </button>

                <button class="login__botao-cadastrar"
                onclick="window.location.href='cadastro.html'" >
                Cadastrar
                </button>

                <!-- LINK -->
                <a href="#"
                class="login__importacao-perfil"
                >Importar perfil</a>
            </div> <!-- Fim da Classe Login -->

            <div class="login__logo">
                <img src="Imagens/S.O.C.T.Logo.png" alt="Logo do SOCT">
            </div>


        </div> <!-- Fim do Conteúdo do container -->
    </div> <!-- Fim do container -->

    
</body>
</html>
