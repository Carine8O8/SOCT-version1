<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro S.O.C.T.</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=League+Spartan:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arimo', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e8f0fe;
            padding: 20px;
        }

        .container {
            display: flex;
            background-color: white;
            background-image: url(Imagens/fundo2.png);
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            width: 950px; 
            max-width: 100%; 
            height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* --- BOTÃO VOLTAR (ESTILO DA IMAGEM) --- */
        .btn-voltar {
            position: absolute;
            top: 30px;
            left: 40px;
            text-decoration: none;
            color: #2b6cb0;
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            font-size: 24px;
            transition: 0.3s;
            z-index: 20;
        }

        .btn-voltar:hover {
            color: #1a4a7a;
            transform: scale(1.05);
        }

        .login-section {
            flex: 1;
            padding: 39px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.6); 
        }

        .login-section h1 {
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            color: #2b6cb0;
            font-size: 40px;
            text-decoration: underline;
            margin-bottom: 30px; 
        }

        .login-section p {
            font-family: 'League Spartan', sans-serif;
            color: #2b6cb0;
            font-size: 16px;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .form-cadastro {
            width: 100%;
            max-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            text-align: left;
            gap: 2px;
        }

        .separador-seguranca {
            margin-top: 15px;
        }

        .label-style {
            color: #2b6cb0;
            font-size: 12px;
            font-weight: bold;
        }

        /* --- INPUTS E PLACEHOLDERS --- */
        input, select {
            width: 100%;
            padding: 10px 15px;
            border: 2px solid #2b6cb0;
            border-radius: 10px;
            outline: none;
            color: #2b6cb0;
            background-color: white;
        }

        /* CORRIGINDO A COR DO PLACEHOLDER */
        input::placeholder, select::placeholder {
            color: #2b6cb0 !important;
            opacity: 1; /* Para Firefox */
        }

        .input-top {
            background-color: #e8f0fe;
        }

        .btn-finalizar {
            width: 100%;
            padding: 12px;
            border-radius: 20px;
            border: 2px solid #2b6cb0;
            background-color: #2b6cb0;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .btn-finalizar:hover {
            background-color: #1a4a7a;
        }

        .dicas-box {
            position: absolute;
            bottom: 0;
            left: 0;
            background-color: #2b6cb0;
            color: white;
            width: 80px;  
            height: 80px; 
            border-radius: 0 100% 0 0;
            display: flex;
            align-items: flex-end;
            padding: 15px;
            cursor: pointer;
            transition: 0.3s;
            border: none;
            z-index: 10;
        }

        .dicas-box span {
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            font-size: 14px;
        }

        /* --- MODAL DE DICAS --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(43, 108, 176, 0.4);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #2b6cb0;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(0,0,0,0.2);
        }

        .modal-content h2 {
            font-family: 'League Spartan', sans-serif;
            color: #2b6cb0;
            margin-bottom: 20px;
            text-decoration: underline;
        }

        .modal-content ul {
            text-align: left;
            list-style: none;
            color: #2b6cb0;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .modal-content li {
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-content li::before {
            content: "•";
            font-size: 20px;
            color: #2b6cb0;
        }

        .btn-fechar {
            background-color: #2b6cb0;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        @media (max-width: 768px) {
            .container { height: auto; padding-bottom: 100px; }
            .btn-voltar { top: 15px; left: 15px; font-size: 20px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="btn-voltar">Voltar</a>

        <div class="login-section">
            <h1>Cadastre-se</h1>
            <p>Preencha tudo certinho,<br>por favor.</p>
          
            <p class="linha">_________________________________________</p>
            
            <form class="form-cadastro">
                <input type="text" placeholder="Nome Completo" class="input-top">
                <input type="text" placeholder="Usuário" class="input-top">
                <input type="password" placeholder="Senha" class="input-top">
                
                <div class="input-group separador-seguranca">
                    <label class="label-style">Pergunta de segurança</label>
                    <select>
                        <option value="" disabled selected>Selecione uma pergunta</option>
                        <option>Qual a sua cor favorita?</option>
                        <option>Nome do seu primeiro animal de estimação?</option>
                        <option>Nome do seu filho?</option>
                        <option>Nome da sua mãe?</option>
                    </select>
                </div>
                
                <div class="input-group">
                    <label class="label-style">Resposta</label>
                    <input type="text" placeholder="Digite sua resposta">
                </div>

                <button type="submit" class="btn-finalizar">Finalizar Cadastro</button>
            </form>
        </div>

        <button class="dicas-box" onclick="abrirModal()">
            <span>Dicas</span>
        </button>
    </div>

    <div class="modal-overlay" id="modalDicas">
        <div class="modal-content">
            <h2>Dicas Amigáveis</h2>
            <ul>
                <li>Senha de no mínimo 4 dígitos</li>
                <li>Crie um usuário fácil de se lembrar</li>
                <li>Seja honesto ao responder a pergunta</li>
            </ul>
            <button class="btn-fechar" onclick="fecharModal()">Entendi!</button>
        </div>
    </div>

    <script>
        const modal = document.getElementById('modalDicas');
        function abrirModal() { modal.style.display = 'flex'; }
        function fecharModal() { modal.style.display = 'none'; }
        window.onclick = function(event) { if (event.target == modal) { fecharModal(); } }
    </script>

</body>
</html>
