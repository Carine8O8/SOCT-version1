<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.C.T. - Conhecimentos Criados</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=League+Spartan:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Arimo', sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #e8f0fe;
            padding: 20px;
        }

        .container {
            display: flex;
            flex-direction: column;
            background-color: white;
            background-image: url('Imagens/fundo3.png');
            background-size: cover; 
            background-position: center;
            background-repeat: no-repeat;
            width: 950px; 
            height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            padding: 40px;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
            margin-bottom: 5px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .btn-nav {
            text-decoration: none;
            color: #2b6cb0;
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            font-size: 24px;
            transition: 0.3s;
        }

        .btn-nav:hover {
            opacity: 0.7;
        }

        .logo-corner {
            width: 180px; 
            margin-top: -15px;
        }

        .page-title {
            text-align: center;
            color: #2b6cb0;
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            font-size: 28px;
            text-decoration: underline;
            margin-bottom: 60px;
        }

        .knowledge-list {
            background-color: white;
            border: 2px solid #2b6cb0;
            border-radius: 20px;
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            margin: 0 auto;
            width: 90%;
        }

        /* Scrollbar Estilizada */
        .knowledge-list::-webkit-scrollbar {
            width: 12px;
        }
        .knowledge-list::-webkit-scrollbar-track {
            background: transparent;
            margin: 15px;
        }
        .knowledge-list::-webkit-scrollbar-thumb {
            background-color: #bdd1f6;
            border-radius: 10px;
            border: 3px solid white;
        }

        .knowledge-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 25px;
            border-bottom: 1px solid #e0e0e0;
            transition: 0.2s;
        }

        .knowledge-item:last-child {
            border-bottom: none;
        }

        .item-info h3 {
            color: #2b6cb0;
            font-family: 'League Spartan', sans-serif;
            font-weight: 900;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .item-info p {
            color: #666;
            font-size: 14px;
        }

        .item-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 24px;
            height: 24px;
            fill: #2b6cb0;
            cursor: pointer;
            transition: 0.3s;
        }

        .icon-btn:hover {
            transform: scale(1.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header-top">
            <div class="nav-links">
                <a href="central.html" class="btn-nav">Voltar</a>
                <a href="edicao.html" class="btn-nav">Criar Novo</a>
            </div>
            <img src="Imagens/logo.jpg" alt="Logo" class="logo-corner">
        </div>

        <h1 class="page-title">Conhecimentos criados</h1>

        <div class="knowledge-list">
            
            <div class="knowledge-item">
                <div class="item-info">
                    <h3>Titulo do Conhecimento</h3>
                    <p>Conteúdo do SOCT...</p>
                </div>
                <div class="item-actions">
                    <svg class="icon-btn" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                    <a href="edicao.html">
                        <svg class="icon-btn" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </a>
                </div>
            </div>

            <div class="knowledge-item" style="border: 1px solid #2b6cb0; border-radius: 10px; margin: 5px 0;">
                <div class="item-info">
                    <h3>Exemplo Selecionado</h3>
                    <p>Este item mostra o destaque azul.</p>
                </div>
                <div class="item-actions">
                    <svg class="icon-btn" viewBox="0 0 24 24"><path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z"/></svg>
                    <a href="edicao.html">
                        <svg class="icon-btn" viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
