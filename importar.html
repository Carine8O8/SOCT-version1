<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.O.C.T. - Importar Conhecimento</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Arimo:wght@400;700&family=League+Spartan:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Arimo', sans-serif; }

        body {
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; background-color: #e8f0fe; padding: 20px;
        }

        .container {
            display: flex; flex-direction: column;
            background-color: white; 
            background-image: url('Imagens/fundo3.png');
            background-size: cover; background-position: center;
            width: 950px; height: 600px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            border-radius: 10px; position: relative;
            padding: 30px 40px; overflow: hidden;
            text-align: center;
        }

        #notification {
            position: absolute; top: -70px; left: 50%;
            transform: translateX(-50%); background-color: #2b6cb0;
            color: white; padding: 15px 45px; border-radius: 0 0 15px 15px;
            font-family: 'League Spartan', sans-serif; font-weight: 700;
            font-size: 18px; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            z-index: 1000;
        }

        .header-nav {
            display: flex; justify-content: flex-start; margin-bottom: 20px;
        }

        .btn-voltar {
            text-decoration: none; color: #2b6cb0; 
            font-family: 'League Spartan', sans-serif;
            font-weight: 900; font-size: 22px; cursor: pointer;
        }

        .titulo-pagina {
            font-family: 'League Spartan', sans-serif;
            font-size: 36px; color: #2b6cb0; font-weight: 900;
            margin-bottom: 50px;
        }

        .import-area {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            position: relative;
        }

        /* Enfeite PNG - Descido até o meio da borda */
        .enfeite-container {
            width: 130px; height: 130px; background-color: white;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            position: absolute; top: -65px; /* Ajustado para ficar exatamente no meio */
            z-index: 2;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .enfeite-img { width: 95px; height: 95px; object-fit: contain; }

        /* Dropzone centralizada */
        .dropzone {
            width: 100%; max-width: 820px; height: 320px;
            background-color: #c2e1ff; border-radius: 35px;
            display: flex; flex-direction: column; 
            align-items: center; justify-content: center; /* Centraliza tudo no meio */
            padding: 20px; border: none; position: relative;
            cursor: pointer; transition: 0.3s;
            gap: 20px; /* Espaço entre o texto e o ícone */
        }

        .dropzone:hover { background-color: #b0d4f5; }

        .dropzone-text {
            font-family: 'Arimo', sans-serif; font-size: 22px;
            color: #2b6cb0; text-decoration: underline;
            font-weight: bold;
            text-align: center;
        }

        .icon-box { 
            width: 85px; height: 85px; 
            opacity: 0.9;
        }

        #file-input { display: none; }
    </style>
</head>
<body>

    <div id="notification">Importação realizada com sucesso!</div>

    <div class="container">
        <div class="header-nav">
            <a href="central.html" class="btn-voltar">Voltar</a>
        </div>

        <h1 class="titulo-pagina">Importar Conhecimento</h1>

        <div class="import-area">
          

            <div class="dropzone" id="dropzone" onclick="document.getElementById('file-input').click()">
                
                <p class="dropzone-text">Solte ou selecione o arquivo clicando aqui....</p>
                
                <svg class="icon-box" viewBox="0 0 24 24" fill="none" stroke="#2b6cb0" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16Z"></path>
                    <path d="m3.3 7 8.7 5 8.7-5"></path>
                    <path d="M12 22V12"></path>
                    <polyline points="12 22 19 18 19 11"></polyline>
                    <polyline points="12 12 5 8"></polyline>
                </svg>

                <input type="file" id="file-input" accept=".json, .soct, .txt">
            </div>

        </div>
    </div>

    <script>
        const fileInput = document.getElementById('file-input');
        const notification = document.getElementById('notification');

        function showSuccess() {
            notification.style.top = "0px";
            setTimeout(() => {
                notification.style.top = "-70px";
            }, 3000);
        }

        fileInput.addEventListener('change', function(e) {
            if (e.target.files.length > 0) {
                showSuccess();
                setTimeout(() => { e.target.value = ""; }, 3500);
            }
        });

        const dropzone = document.getElementById('dropzone');
        ['dragenter', 'dragover'].forEach(name => {
            dropzone.addEventListener(name, (e) => {
                e.preventDefault();
                dropzone.style.backgroundColor = "#b0d4f5";
            });
        });

        ['dragleave', 'drop'].forEach(name => {
            dropzone.addEventListener(name, (e) => {
                e.preventDefault();
                dropzone.style.backgroundColor = "#c2e1ff";
                if (name === 'drop' && e.dataTransfer.files.length > 0) showSuccess();
            });
        });
    </script>
</body>
</html>
